<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RC5 Cipher</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,900;1,400;1,700;1,900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #181210;
      --surface:  #221a13;
      --surface2: #2a2018;
      --border:   #3a2c1e;
      --border2:  #4a3828;
      --accent:   #c8906a;
      --accent2:  #9a6840;
      --cream:    #f2e8d6;
      --cream2:   #c8b898;
      --muted:    #6e5640;
      --danger:   #b85040;
      --serif:    'Fraunces', Georgia, serif;
      --mono:     'Space Mono', 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--cream2);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* subtle grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 52px 28px 96px;
    }

    /* ── HEADER ── */
    header { margin-bottom: 48px; }

    .header-eyebrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .eyebrow-tag {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .eyebrow-tag span { color: var(--accent); }
    .eyebrow-num {
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 400;
      font-style: italic;
      color: var(--border2);
      letter-spacing: 1px;
    }

    .header-rule { width: 100%; height: 1px; background: var(--border); margin-bottom: 28px; }

    h1 {
      font-family: var(--serif);
      font-weight: 900;
      font-style: italic;
      font-size: clamp(3.6rem, 9vw, 6.4rem);
      line-height: 0.92;
      letter-spacing: -2px;
      color: var(--cream);
    }
    h1 .h1-light {
      font-weight: 400;
      font-style: italic;
      color: var(--accent);
      display: block;
    }

    .header-bottom {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-top: 22px;
    }
    .header-rule-sm { flex: 1; height: 1px; background: var(--border); }
    .header-meta {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── PARAMS BAR ── */
    .params-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border: 1px solid var(--border);
      margin-bottom: 32px;
      background: var(--border);
      gap: 1px;
    }
    @media(max-width:560px){ .params-bar { grid-template-columns: repeat(2,1fr); } }

    .param-item {
      background: var(--surface);
      padding: 18px 20px;
    }
    .param-label {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .param-value {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 900;
      font-style: italic;
      color: var(--cream);
      line-height: 1;
    }
    .param-unit {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 1px;
      margin-left: 4px;
    }

    /* ── MODE TOGGLE ── */
    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--border);
      background: var(--border);
      gap: 1px;
      margin-bottom: 24px;
    }
    .mode-btn {
      padding: 15px 22px;
      background: var(--surface);
      border: none;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mode-btn .arrow { font-size: 14px; font-weight: 400; }
    .mode-btn.active { background: var(--accent2); color: var(--cream); }
    .mode-btn:not(.active):hover { background: var(--surface2); color: var(--cream2); }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 28px 30px;
      margin-bottom: 10px;
    }
    .card-label {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── FORM ── */
    label {
      display: block;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      min-height: 2.4em;
      display: flex;
      align-items: flex-end;
    }
    textarea, input[type="text"], input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 400;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
      line-height: 1.7;
    }
    textarea { min-height: 108px; }
    textarea:focus, input:focus { border-color: var(--accent); }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }
    @media(max-width:560px){ .input-row { grid-template-columns: 1fr; } }

    /* ── BUTTON ── */
    .run-btn {
      width: 100%;
      margin-top: 18px;
      padding: 17px 24px;
      background: var(--accent2);
      border: none;
      color: var(--cream);
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 900;
      font-style: italic;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      letter-spacing: 0.5px;
    }
    .run-btn:hover { background: var(--accent); }
    .run-btn .btn-arrow {
      font-family: var(--mono);
      font-size: 16px;
      font-style: normal;
      font-weight: 700;
    }

    /* ── OUTPUT ── */
    .output-box {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 16px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 400;
      color: var(--accent);
      word-break: break-all;
      min-height: 64px;
      line-height: 2;
      white-space: pre-wrap;
      letter-spacing: 0.5px;
    }
    .output-box.plain { color: var(--cream); font-size: 14px; letter-spacing: 0; }
    .output-box.empty { color: var(--border2); font-style: italic; }

    .copy-btn {
      margin-top: 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── LOG ── */
    .log-box {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 16px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      max-height: 220px;
      overflow-y: auto;
      line-height: 2;
    }
    .log-step { color: var(--accent2); font-weight: 700; }
    .log-val  { color: var(--cream2); }

    /* ── ERROR ── */
    .error-msg {
      color: var(--danger);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin-top: 10px;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 60px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-left {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: 15px;
      color: var(--muted);
    }
    .footer-right {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--border2);
    }
    @media(max-width:560px){ footer { flex-direction: column; gap: 12px; } }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-eyebrow">
      <div class="eyebrow-tag">Sistem Keamanan &nbsp;/&nbsp; <span>RC5 Cipher</span></div>
      <div class="eyebrow-num">Rivest, 1994</div>
    </div>
    <div class="header-rule"></div>
    <h1>
      Enkripsi
      <span class="h1-light">&amp; Dekripsi</span>
    </h1>
    <div class="header-bottom">
      <div class="header-rule-sm"></div>
      <div class="header-meta">RC5 &nbsp;·&nbsp; Block Cipher &nbsp;·&nbsp; Symmetric</div>
      <div class="header-rule-sm"></div>
    </div>
  </header>

  <!-- PARAMS -->
  <div class="params-bar">
    <div class="param-item">
      <div class="param-label">Word Size</div>
      <div class="param-value" id="param-w">32 <span class="param-unit">bit</span></div>
    </div>
    <div class="param-item">
      <div class="param-label">Rounds</div>
      <div class="param-value" id="param-r">12</div>
    </div>
    <div class="param-item">
      <div class="param-label">Key Length</div>
      <div class="param-value" id="param-b">16 <span class="param-unit">byte</span></div>
    </div>
    <div class="param-item">
      <div class="param-label">Notasi</div>
      <div class="param-value" id="param-mode" style="font-size:15px">RC5-32/12/16</div>
    </div>
  </div>

  <!-- MODE -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-enc" onclick="setMode('encrypt')">
      <span class="arrow">→</span> Enkripsi
    </button>
    <button class="mode-btn" id="btn-dec" onclick="setMode('decrypt')">
      <span class="arrow">←</span> Dekripsi
    </button>
  </div>

  <!-- INPUT -->
  <div class="card">
    <div class="card-label">Input</div>
    <label id="lbl-input">Plaintext</label>
    <textarea id="input-text" placeholder="Masukkan teks..."></textarea>
    <div class="input-row" style="grid-template-columns:2fr 1fr 1fr 1fr;align-items:end">
      <div>
        <label>Kunci Rahasia</label>
        <input type="text" id="input-key" placeholder="kunci rahasia..."/>
      </div>
      <div>
        <label>Putaran (r)</label>
        <input type="number" id="input-rounds" value="12" min="1" max="255" onchange="updateParams()"/>
      </div>
      <div>
        <label>Key Length (byte)</label>
        <select id="input-keylen" onchange="updateParams()" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--cream);font-family:var(--mono);font-size:13px;padding:13px 16px;outline:none;cursor:pointer;">
          <option value="8">8</option>
          <option value="16" selected>16</option>
          <option value="24">24</option>
          <option value="32">32</option>
        </select>
      </div>
      <div>
        <label>Word Size (bit)</label>
        <select id="input-wordsize" onchange="updateParams()" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--cream);font-family:var(--mono);font-size:13px;padding:13px 16px;outline:none;cursor:pointer;">
          <option value="16">16</option>
          <option value="32" selected>32</option>
          <option value="64">64</option>
        </select>
      </div>
    </div>
    <div id="error-msg" class="error-msg"></div>
    <button class="run-btn" id="run-btn" onclick="runRC5()">
      <span id="btn-label">Jalankan Enkripsi</span>
      <span class="btn-arrow">—›</span>
    </button>
  </div>

  <!-- OUTPUT -->
  <div class="card">
    <div class="card-label">Hasil</div>
    <label id="lbl-output">Ciphertext (Hex)</label>
    <div class="output-box empty" id="output-box">Hasil akan muncul di sini...</div>
    <button class="copy-btn" onclick="copyOutput()">Salin Hasil</button>
  </div>

  <!-- LOG -->
  <div class="card">
    <div class="card-label">Log Proses</div>
    <div class="log-box" id="log-box">
      <span style="color:var(--border2);font-style:italic">— menunggu proses —</span>
    </div>
  </div>

  <footer>
    <div class="footer-left">RC5 · Ronald Rivest, 1994</div>
    <div class="footer-right">Sistem Keamanan &nbsp;2026</div>
  </footer>

</div>
<script>
const P32=0xB7E15163,Q32=0x9E3779B9;
let logs=[];
function log(msg,type=''){logs.push({msg,type});}

//) Fungsi dasar dan operasi bit
function getMask(w){ return w===16 ? 0xFFFF : (Math.pow(2,32)-1)>>>0; }
function getP(w){ return w===16?0xB7E1:w===32?0xB7E15163:0xB7E151628AED2A6B; } // approx for 64
function getQ(w){ return w===16?0x9E37:w===32?0x9E3779B9:0x9E3779B97F4A7C15; }

function rotL(x,n,w){
  const mask=getMask(w);
  n=((n%w)+w)%w;
  if(!n)return x&mask;
  return((x<<n)|(x>>>(w-n)))&mask;
}
function rotR(x,n,w){
  const mask=getMask(w);
  n=((n%w)+w)%w;
  if(!n)return x&mask;
  return((x>>>n)|(x<<(w-n)))&mask;
}
function addMod(a,b,mask){return(((a>>>0)+(b>>>0))&mask)>>>0;}
function subMod(a,b,mask){return(((a>>>0)-(b>>>0))&mask)>>>0;}

//

function keyToBytes(k,b){const r=[];for(let i=0;i<b;i++)r.push(i<k.length?k.charCodeAt(i):0);return r;}

//Key Expansion:
function keyExpansion(keyStr,r,b,w){
  const mask=getMask(w),Pw=getP(w),Qw=getQ(w);
  const u=w/8,c=Math.max(1,Math.ceil(b/u)),t=2*(r+1);
  log('=== KEY EXPANSION ===','step');
  log(`w=${w}, r=${r}, b=${b}, c=${c}, t=${t}`);
  const L=new Array(c).fill(0),kb=keyToBytes(keyStr,b);
  for(let i=b-1;i>=0;i--)L[Math.floor(i/u)]=addMod(L[Math.floor(i/u)]<<8,kb[i],mask);
  log(`L: [${L.map(v=>'0x'+(v>>>0).toString(16).toUpperCase().padStart(u*2,'0')).join(', ')}]`,'val');
  const S=new Array(t).fill(0);
  S[0]=Pw;for(let i=1;i<t;i++)S[i]=addMod(S[i-1],Qw,mask);
  log(`S[0]=0x${(Pw>>>0).toString(16).toUpperCase()}`,'val');
  let A=0,B=0,ii=0,j=0;
  const n=3*Math.max(t,c);
  for(let k=0;k<n;k++){
    S[ii]=rotL(addMod(addMod(S[ii],A),B,mask),3,w);A=S[ii];ii=(ii+1)%t;
    L[j]=rotL(addMod(addMod(L[j],A),B,mask),addMod(A,B,mask),w);B=L[j];j=(j+1)%c;
  }
  log(`Mixing selesai — ${n} iterasi. Sub-key S[0..${t-1}] siap.`);
  return S;
}
//

//Enkripsi dan Dekripsi Blok:
function encBlock(A,B,S,r,w){
  const mask=getMask(w);
  A=addMod(A,S[0],mask);B=addMod(B,S[1],mask);
  for(let i=1;i<=r;i++){
    A=addMod(rotL(A^B,B,w),S[2*i],mask);
    B=addMod(rotL(B^A,A,w),S[2*i+1],mask);
  }
  return[A>>>0,B>>>0];
}
function decBlock(A,B,S,r,w){
  const mask=getMask(w);
  for(let i=r;i>=1;i--){
    B=rotR(subMod(B,S[2*i+1],mask),A,w)^A;
    A=rotR(subMod(A,S[2*i],mask),B,w)^B;
  }
  B=subMod(B,S[1],mask);A=subMod(A,S[0],mask);return[A>>>0,B>>>0];
}
//

function strToBytes(s){const b=[];for(let i=0;i<s.length;i++){const c=s.charCodeAt(i);if(c>0xFF){b.push((c>>8)&0xFF);b.push(c&0xFF);}else b.push(c);}return b;}
function padBytes(b,bs){const p=bs-(b.length%bs);for(let i=0;i<p;i++)b.push(p);return b;}
function unpadBytes(b){if(!b.length)return b;const p=b[b.length-1];if(p<1||p>16)return b;return b.slice(0,b.length-p);}

function encryptRC5(pt,key,r,b,w){
  logs=[];log('=== ENKRIPSI RC5 ===','step');log(`Plaintext: "${pt}"`,'val');
  const S=keyExpansion(key,r,b,w);
  const mask=getMask(w),blockSize=w/4; // 2 words * w/8 bytes each = w/4 bytes
  let bytes=strToBytes(pt);
  log('\n=== PROSES BLOK ===','step');
  log(`Byte awal: [${bytes.map(x=>x.toString(16).padStart(2,'0')).join(' ')}]`,'val');
  bytes=padBytes(bytes,blockSize);
  log(`Setelah padding: ${bytes.length} byte — ${bytes.length/blockSize} blok`);
  const cb=[];
  const hw=w/8; // bytes per word
  for(let i=0;i<bytes.length;i+=blockSize){
    let A=0,B=0;
    for(let k=0;k<hw;k++){A|=(bytes[i+k]<<(k*8));B|=(bytes[i+hw+k]<<(k*8));}
    A=A>>>0;B=B>>>0;
    log(`Blok ${i/blockSize+1}: A=0x${A.toString(16).toUpperCase().padStart(hw*2,'0')} B=0x${B.toString(16).toUpperCase().padStart(hw*2,'0')}`);
    const[eA,eB]=encBlock(A,B,S,r,w);
    log(`→ A=0x${eA.toString(16).toUpperCase().padStart(hw*2,'0')} B=0x${eB.toString(16).toUpperCase().padStart(hw*2,'0')}`,'val');
    for(let k=0;k<hw;k++)cb.push((eA>>(k*8))&0xFF);
    for(let k=0;k<hw;k++)cb.push((eB>>(k*8))&0xFF);
  }
  const hex=cb.map(x=>x.toString(16).padStart(2,'0').toUpperCase()).join('');
  log(`\nCiphertext: ${hex}`,'val');
  return hex;
}

function decryptRC5(hex,key,r,b,w){
  logs=[];log('=== DEKRIPSI RC5 ===','step');log(`Ciphertext: ${hex}`,'val');
  const S=keyExpansion(key,r,b,w);
  const mask=getMask(w),blockSize=w/4,hw=w/8;
  const bytes=[];
  for(let i=0;i<hex.length;i+=2)bytes.push(parseInt(hex.substr(i,2),16));
  if(bytes.length%blockSize!==0)throw new Error('Format ciphertext tidak valid.');
  log('\n=== PROSES BLOK ===','step');
  const pb=[];
  for(let i=0;i<bytes.length;i+=blockSize){
    let A=0,B=0;
    for(let k=0;k<hw;k++){A|=(bytes[i+k]<<(k*8));B|=(bytes[i+hw+k]<<(k*8));}
    A=A>>>0;B=B>>>0;
    log(`Blok ${i/blockSize+1}: A=0x${A.toString(16).toUpperCase().padStart(hw*2,'0')} B=0x${B.toString(16).toUpperCase().padStart(hw*2,'0')}`);
    const[dA,dB]=decBlock(A,B,S,r,w);
    log(`→ A=0x${dA.toString(16).toUpperCase().padStart(hw*2,'0')} B=0x${dB.toString(16).toUpperCase().padStart(hw*2,'0')}`,'val');
    for(let k=0;k<hw;k++)pb.push((dA>>(k*8))&0xFF);
    for(let k=0;k<hw;k++)pb.push((dB>>(k*8))&0xFF);
  }
  const res=unpadBytes(pb).map(x=>String.fromCharCode(x)).join('');
  log(`\nPlaintext: "${res}"`,'val');
  return res;
}

let mode='encrypt',W=32;
function setMode(m){
  mode=m;const enc=m==='encrypt';
  document.getElementById('btn-enc').className='mode-btn'+(enc?' active':'');
  document.getElementById('btn-dec').className='mode-btn'+(!enc?' active':'');
  document.getElementById('lbl-input').textContent=enc?'Plaintext':'Ciphertext (Hex)';
  document.getElementById('lbl-output').textContent=enc?'Ciphertext (Hex)':'Plaintext';
  document.getElementById('btn-label').textContent=enc?'Jalankan Enkripsi':'Jalankan Dekripsi';
  document.getElementById('input-text').placeholder=enc?'Masukkan teks...':'Masukkan ciphertext hex...';
  document.getElementById('output-box').textContent='Hasil akan muncul di sini...';
  document.getElementById('output-box').className='output-box empty';
  document.getElementById('input-text').value='';
  document.getElementById('error-msg').textContent='';
  document.getElementById('log-box').innerHTML='<span style="color:var(--border2);font-style:italic">— menunggu proses —</span>';
}
function updateParams(){
  const r=document.getElementById('input-rounds').value;
  const b=document.getElementById('input-keylen').value;
  const w=document.getElementById('input-wordsize').value;
  W=parseInt(w);
  // update key maxlength
  document.getElementById('input-key').maxLength=parseInt(b);
  // update params bar
  document.getElementById('param-r').textContent=r;
  document.getElementById('param-w').innerHTML=`${w} <span class="param-unit">bit</span>`;
  document.getElementById('param-b').innerHTML=`${b} <span class="param-unit">byte</span>`;
  document.getElementById('param-mode').textContent=`RC5-${w}/${r}/${b}`;
}
function runRC5(){
  const inp=document.getElementById('input-text').value.trim();
  const key=document.getElementById('input-key').value;
  const r=parseInt(document.getElementById('input-rounds').value);
  const b=parseInt(document.getElementById('input-keylen').value);
  const w=parseInt(document.getElementById('input-wordsize').value);
  const err=document.getElementById('error-msg');
  const out=document.getElementById('output-box');
  err.textContent='';
  if(!inp){err.textContent='⚠ Input tidak boleh kosong.';return;}
  if(!key){err.textContent='⚠ Kunci tidak boleh kosong.';return;}
  if(isNaN(r)||r<1||r>255){err.textContent='⚠ Putaran harus antara 1–255.';return;}
  if(w===64){err.textContent='⚠ Word size 64-bit belum didukung penuh di JavaScript.';return;}
  try{
    let res;
    if(mode==='encrypt'){
      res=encryptRC5(inp,key,r,b,w);out.textContent=res;out.className='output-box';
    }else{
      const hx=inp.replace(/\s/g,'');
      if(!/^[0-9a-fA-F]+$/.test(hx)||hx.length%2!==0){err.textContent='⚠ Format hex tidak valid.';return;}
      res=decryptRC5(hx,key,r,b,w);out.textContent=res;out.className='output-box plain';
    }
    renderLog();
  }catch(e){err.textContent='⚠ '+e.message;}
}
function renderLog(){
  const b=document.getElementById('log-box');
  b.innerHTML=logs.map(l=>{
    if(l.type==='step')return`<div><span class="log-step">${esc(l.msg)}</span></div>`;
    if(l.type==='val')return`<div><span class="log-val">${esc(l.msg)}</span></div>`;
    return`<div>${esc(l.msg)}</div>`;
  }).join('');
  b.scrollTop=b.scrollHeight;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function copyOutput(){
  const t=document.getElementById('output-box').textContent;
  if(!t||t==='Hasil akan muncul di sini...')return;
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.querySelector('.copy-btn');
    b.textContent='Tersalin!';
    setTimeout(()=>b.textContent='Salin Hasil',2000);
  });
}
</script>
